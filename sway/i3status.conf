# i3status configuration file, used by the sway `bar` block.
# see "man i3status" for documentation.
#
# i3status is compositor-agnostic (it reads /sys and /proc), so this works
# unchanged under sway. Porting markers:
#   # PORT:     adjusted for a modern Wayland/PipeWire setup
#   # OBSOLETE: kept for reference but redundant/unsupported on a current system
#
# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 5
}

order += "ipv6"
order += "disk /"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery 0"
order += "load"
order += "tztime madrid"
order += "tztime LA"
order += "tztime DC"
order += "tztime local"
# PORT: enable the volume line in the bar. The `volume master` block below was
# defined in the original but never added to `order`, so it never displayed.
# On PipeWire/PulseAudio systems i3status' volume module still works via the
# ALSA compat layer. If it shows nothing, drop this and show volume in a
# separate tool (e.g. wob/swayosd), or switch to i3status-rust.
order += "volume master"

wireless _first_ {
        format_up = "W: (%quality at %essid) %ip"
        format_down = "W: down"
}

ethernet _first_ {
        # if you use %speed, i3status requires root privileges
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
}

battery 0 {
        format = "%status %percentage %remaining"
        status_chr = "⚡"
        status_bat = "🔋"
        status_full = "☻"
        hide_seconds = true
        integer_battery_capacity = true
}

tztime madrid {
        format = "MAD: %H:%M(%a)"
        timezone = "Europe/Madrid"
}
tztime LA {
        format = "SF: %H:%M(%a)"
        timezone = "America/Los_Angeles"
}
tztime DC {
        format = "NY: %H:%M(%a)"
        timezone = "America/New_York"
}

tztime local {
        format = "%a %d %b %H:%M"
        timezone = "Australia/Melbourne"
}

load {
        format = "%1min"
}

disk "/" {
        format = "%avail"
}

volume master {
        format = "♪: %volume"
        format_muted = "♪: X"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}
