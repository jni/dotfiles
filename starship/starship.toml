"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time\
[оӮ°](bg:color_orange fg:color_bg1)\
$directory\
[оӮ°](fg:color_orange bg:color_aqua)\
$git_branch\
$git_status\
[оӮ°](fg:color_aqua bg:color_blue)\
$docker_context\
$conda\
$pixi\
[оӮ° ](fg:color_blue)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = true
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "у°ҢҪ"


[directory]
style = "bg:color_orange fg:color_fg0"
format = "[ $path ]($style)"
truncate_to_repo = true
repo_root_format = "[ рҹӣ пёҸ$path ]($style)"
truncation_length = 4
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[bun]
symbol = "оқҜ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "оҳһ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "оҳқ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "оү–"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
symbol = "оң• "
style = "bg:color_blue"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_blue)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%a %Y-%m-%d %H:%M"
style = "bg:color_bg1"
format = '[[ пҗә $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false
